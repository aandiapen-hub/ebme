services:
  web:
    build:
      context: .
      dockerfile: docker/dev/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env.development
      - static/company_info/.env
    extra_hosts:
      -  "host.docker.internal:host-gateway"
    tty: "true"

    
  redis:
    image: redis:latest
