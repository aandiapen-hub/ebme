<!-- Button trigger modal -->
<button id='open_filter_modal' type="button" class="btn btn-outline-primary btn-sm" data-bs-toggle="modal" data-bs-target="#filter_list_Modal"
_="on click set value of #filter_list_search_box to '' then trigger input on #filter_list_search_box "
>
  Add filters
  
</button>

<!-- Modal -->
<div class="modal fade" id="filter_list_Modal" tabindex="-1" aria-labelledby="filter_list_Modal" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Choose more filters</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          
      </div>
      <div class="modal-body">
    
      <input id="filter_list_search_box"
            _="on input
              set lis to <li/> in next <ul/>
                  repeat for li in lis
                    if li.id.toLowerCase() contains my.value.toLowerCase() 
                      then show li
                    else hide li
                  end

                "
          />

        <ul id='filter_list' class="list-group">
          {% for field,params in filter_fields.items  %}

                <li id="li_{{params.verbose_name}}" class="list-group-item" >

                      <div class="accordion accordion-flush" id="accordion_{{field}}">
                        <div class="accordion-item">
                          <h2 class="accordion-header">

                  <button id='accordion_button_{{field}}' class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapse_{{field}}" aria-expanded="false" aria-controls="flush-collapse_{{field}}">
                              {{params.verbose_name}}
                            </button>
                          </h2>
                          <div id="flush-collapse_{{field}}" class="accordion-collapse collapse" data-bs-parent="#accordionFlush_{{field}}">
                            <div class="accordion-body">
                                          
                                            {% for lookup,label in params.lookup_labels.items  %}
                    <button id='button_{{field}}__{{lookup}}' class="btn btn-outline-primary" 
                                                
                                                  hx-get="{% url app_link %}?{{ request.GET.urlencode }}&new_active_filter={{field}}__{{lookup}}"
                                                  hx-target="#div_filter_fields"
                                                  hx-swap="beforeend"
                                                  hx-trigger='click'
                                                  data-bs-dismiss="modal"
                                                  hx-include="#filter-form input, #filter-form select"
                                                  _="
                                                   on htmx:beforeRequest
                                                    set divid to 'div_id_{{field}}__{{lookup}}'
                                                    set divs to id of <div/> in #div_filter_fields
                                                    if divid is in divs
                                                    halt the event's default
                                                    set div to #div_id_{{field}}__{{lookup}}
                                                    go to the top of #div_id_{{field}}__{{lookup}} -35px
                                                    transition #div_id_{{field}}__{{lookup}} opacity to 0.1
                                                    transition #div_id_{{field}}__{{lookup}} opacity to 1
                                                  "
                                                  >
                                                  {{label}}
                                                
                                            </button>
                                            {% endfor %}
                                          

                            </div>
                          </div>
                        </div>


                      </div>
                </li>


          {% endfor %}
        </ul>

        </div>  
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary">Save changes</button>
              </div>
            </div>
</div>
