
{{ form.media }} 
{% for field in form  %}

      <div id="div_id_{{ field.name }}" class="col-auto">
          <button type="button"
                  class="btn btn-outline-danger btn-sm"
                  _="on click
                    remove #div_id_{{ field.name }}
                    show #button_{{field.name}}
                    trigger change on #filter-form">
          <i class="bi bi-x-circle"></i>
          </button>         


         {{ field.label_tag }} 
         {{ field }}
      </div>
{% endfor %}
