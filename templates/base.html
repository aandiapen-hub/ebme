<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

     
    <title>EBME AMS</title>
    {% load static %}
    <!--Load jQuery-->
    <script src="{% static 'js/jquery.min.js' %}"></script>
    <!-- Load bootstrap -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <!-- Load bootstrap icons -->
    <link rel="stylesheet" href="{% static 'bootstrap-icons/bootstrap-icons.css' %}">
    <!-- Load htmx -->
    <script src="{% static 'js/htmx.min.js' %}"></script>
    <!-- Load favorite icon -->
    <link rel="icon" href="{% static 'company_info/favicon.ico' %}">
    <script src="{% static 'js/hyperscript.js' %}"></script>


<style>

  .select2-container {
    width: 100% !important; /* Ensure the Select2 widget takes the full width */
}

.select2-selection__rendered {
    line-height: 1.5 !important; /* Adjust the height to match Bootstrap inputs */
}

.select2-selection {
    height: 38px !important; /* Match the height of Bootstrap form controls */
    border: 1px solid #ced4da; /* Match Bootstrap border styles */
    border-radius: 0.25rem; /* Match Bootstrap border radius */
}

.select2-container--default .select2-selection--multiple {
    min-height: 38px;
    height: auto !important;
    overflow: visible !important;
    white-space: normal;
    padding: 5px;
    border-radius: 0.375rem;
    border: 1px solid #ced4da;
    display: flex;
    flex-wrap: wrap;
}

.django-select2,
.django-select2-heavy {
    display: none !important;
}
</style>

</head>


<body id='body' class='bg-light'>
    <!--index-->
    {% if user.is_authenticated %}
    {% include "indices/index.html" %}
    {% endif %}
  

    {% block content %}
    {% endblock content %}



    {% block modal %}
    {% include "modal_div_base.html" %}
    {% endblock modal %}
  


</body>
</html>
