{% extends "base.html" %}
{% load django_bootstrap5 %} <!-- Load Crispy Forms -->




{% block content %}

<div class='container'>
  <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {% bootstrap_form form layout='horizontal' %}
      {% bootstrap_button button_type="submit" content="Save" %}
  </form>
</div>
{% endblock content %}
