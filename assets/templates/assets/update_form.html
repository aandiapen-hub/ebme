{% extends "base.html" %}
{% load crispy_forms_tags %} <!-- Load Crispy Forms -->



{% block content %}

<div id='asset_details' class="container">

    <!---Cancel update button-->
    <div class="row">
        <div class="col">
            <button id='cancel_button'
                class='btn btn-outline-secondary'
                hx-get='{% url "assets:view_asset" pk=object.pk %}'
                hx-target='#asset_details'
                hx-swap='innerHTML'
                hx-select='#asset_details'
                hx-push-url='true'>
                <i class="bi bi-backspace"></i> Cancel & Return to Asset
            </button>
        </div>
    </div>
    <form hx-post="{{request.path}}"
    hx-target="#asset_details"
    hx-swap="innerHTML"
    hx-trigger="submit"
    hx-push-url='true'
    hx-select='#asset_details'>
        {{ form.media }} 
        {% csrf_token %}
        
        {{ form|crispy }}
        <button class="btn btn-primary" type="submit">Submit</button>
    
    </form>
 
    
</div>
{% endblock %}
