
{% load crispy_forms_tags %}
<tr id="part-{{ part.partsusedid }}">
<td colspan=6>
       <form
        hx-post="{% url 'jobs:sparepartsused_update' pk=part.partsusedid %}" 
        hx-target="#part-{{ part.partsusedid }}"
        hx-swap="outerHTML"
        hx-trigger="click from:#submit_button">
            {% csrf_token %}
                {{ form.media }}
                {{form|crispy}}
        <button id='submit_button' type='button' class="btn btn-primary">Save changes</button>

        </form>
      
        <button 
        type="button"
        class="btn btn-secondary"
        hx-get="{% url 'jobs:sparepartsused_detail' pk=part.partsusedid %}"
        hx-target="#part-{{ part.partsusedid }}"
        hx-swap="outerHTML">
        Cancel
      </button>

<div id="messages">
  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
  {% endif %}
</div>

    </td>
</tr>
