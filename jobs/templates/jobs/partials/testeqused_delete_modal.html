{% load crispy_forms_tags %} <!-- Load Crispy Forms -->


<div  class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Remove {{object}} from job?</h5>
      </div>
      <div class="modal-body">

        <form class="form" method="post"
        hx-post="{{request.path}}"
        hx-trigger="submit"
        hx-target='#equipmentused-{{object.id}}'
        hx-swap='outerHTML'
        hx-on::after-Request= "bootstrap.Modal.getInstance(document.getElementById('modals-here')).hide();">
        {% csrf_token %}
        {{ form|crispy }}

        <button class="btn btn-danger" type="submit">Confirm Delete</button>
 

        </form>
        {% if error_message %}
        <div class="alert alert-danger" role="alert">
        {{error_message}}  
        </div>
        {% endif %}
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
