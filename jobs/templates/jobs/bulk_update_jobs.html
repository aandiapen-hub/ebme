
{% load django_bootstrap5 %}


{% block content %}
<div class='container'>
<p>Update {{count}} jobs</p>
<form class="form"
hx-post="{% url 'jobs:bulk_update_jobs' %}?{{ request.GET.urlencode }}"
hx-include='#row_select_form'
hx-trigger='submit'
hx-target='#bulk_update_content'
hx-swap='innerHTML'
>
        {% csrf_token %}

        <button class="btn btn-primary" type="submit">Save</button>


        </form>

{% endblock %}
