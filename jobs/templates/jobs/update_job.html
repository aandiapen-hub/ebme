{% extends 'base.html' %}
{% load crispy_forms_tags %} <!-- Load Crispy Forms -->
{% block content %}

<div id='job_details' class='container mb-3'>
        
    <div class='row'>
        <div class="col">
            <button id='cancel_button'
                class='btn btn-outline-secondary'
                hx-get='{% url "jobs:job_summary" pk=object.pk %}'
                hx-target='#job_details'
                hx-swap='innerHTML'
                hx-select='#job_details'
                hx-push-url='true'>
                <i class="bi bi-backspace"> </i>Cancel
            </button>

            <button id='submit_button' class='btn btn-outline-primary'>Save Changes</button>
        </div>
    
    <div class="row">
        <div class='col'>
            
            <form hx-post='{{request.path}}'
            hx-target='#job_details'
            hx-swap='innerHTML'
            hx-select='#job_details'
            hx-push-url='true'
            hx-trigger="click from:#submit_button">
                {{form.media}}
                {% csrf_token %}
                {{form|crispy}}
            </form>
        </div>
    </div>
    


        <div class="col-12"
            hx-trigger='load'
            hx-get="{% url 'jobs:testscarriedout' %}?jobid={{ form.jobid.value }}">
                <div class="spinner-border " role="status">
                <span class="visually-hidden">Loading...</span>
                </div>
        </div>

        <div class="col-12"
            hx-trigger='load'
            hx-get="{% url "jobs:sparepartsused" %}?jobid={{ form.jobid.value }}">
                <div class="spinner-border " role="status">
                <span class="visually-hidden">Loading...</span>
                </div>
        </div>

        <div class="col-12"
            hx-trigger='load'
            hx-get="{% url "jobs:testequipmentused" %}?jobid={{ form.jobid.value }}">
                <div class="spinner-border " role="status">
                <span class="visually-hidden">Loading...</span>
                </div>
        </div>
    <div>
</div>
{%endblock content%}
