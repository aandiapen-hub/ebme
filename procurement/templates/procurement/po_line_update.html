{% extends "base.html" %}
{% load crispy_forms_tags %} <!-- Load Crispy Forms -->



{% block content %}

<div class="container">

    <form action="{{request.path}}" method="post">
        {{ form.media }} 
        {% csrf_token %}
        
        {{ form|crispy }}
        <button class="btn btn-primary" type="submit">Submit</button>
    </form>
</div>
{% endblock %}
