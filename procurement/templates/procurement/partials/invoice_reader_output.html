{% extends "base.html" %}

{% block content %}

<div id='reader_output' class='container m-3'>
<h4>Identified Information</h4>
<ul class="list-group">

    {% for item,value in output.items  %}
      <li class="list-group-item"><p>{{item}} - {{value}}</p></li>

    {% endfor %}
</ul>
<p>{{ error }}</p>




{% if existing_invoice %}
<h4>invoice exisits</h4>
<div id='existing_delivery'
hx-get='{% url "procurement:invoices_detail" pk=existing_invoice.pk %}'
hx-trigger='load'
hx-target='this'
hx-swap='outerHTML'>
</div>


{% else %}
<h4>Create New Invoice</h4>
<div id='new_invoice'
hx-get='{% url "procurement:invoices_create" %}?temp_file_group={{ temp_file_group}}'
hx-trigger='load'
hx-target='this'
hx-select='#create_invoice'
hx-swap='outerHTML'>
</div>

{% endif %}

</div>

{% endblock content %}
