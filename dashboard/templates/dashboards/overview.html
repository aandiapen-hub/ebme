{% extends "base.html" %}
{% load django_tables2 %}

{% block content %}

<div class='container'>
  <div class="row g-3 mb-3">
    <div class="col-md-6 col-sm-12">
            <div id='asset_compliance'
            hx-trigger='intersect'
            hx-target='this'
            hx-swap='innerHTML'
            hx-get='{% url "dashboards:asset_compliance" %}'>
          </div>

      <div class="accordion" id="accordionExample">
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseModel" aria-expanded="false" aria-controls="collapseModel">
            Model Compliance
          </button>
        </h2>
        <div id="collapseModel" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
          <div class="accordion-body">
            <div id='model_compliance'
            hx-trigger='intersect'
            hx-target='this'
            hx-swap='innerHTML'
            hx-get='{% url "dashboards:model_compliance" %}'>
          </div>
        </div>
      </div>
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseTwo" aria-expanded="false" aria-controls="collapseTwo">
            Category Compliance
          </button>
        </h2>
        <div id="collapseTwo" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
          <div class="accordion-body">
              <div id='category_compliance'
              hx-trigger='intersect'
              hx-target='this'
              hx-swap='innerHTML'
              hx-get='{% url "dashboards:category_compliance" %}'>
            </div>
          </div>
        </div>
      </div>
      </div>
      </div>
    </div>

    <div class="col-md-6 col-sm-12">
       <div id='open_jobs'
            hx-trigger='intersect'
            hx-target='this'
            hx-swap='innerHTML'
            hx-get='{% url "dashboards:open_jobs" %}'>
          </div>
    </div>
  </div>

  
</div>
{%endblock content%}
