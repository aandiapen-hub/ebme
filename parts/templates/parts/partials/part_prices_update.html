{% load crispy_forms_tags %} <!-- Load Crispy Forms -->

<tr id='row-{{object.pk}}'>
    <td>
    <form
        hx-post="{{request.path}}"
        hx-trigger='submit'
        hx-target='#row-{{object.pk}}'
        hx-swap='outerHTML'>
        {% csrf_token %}
        {{ form|crispy}}    

        <button id="save_button" class="btn btn-sm btn-outline-warning" type="submit">Save</button>

        <button
        hx-get="{% url 'parts:part_prices_detail' pk=object.pk %}"
        hx-trigger='click'
        hx-target='#row-{{object.pk}}'
        hx-swap='outerHTML'
        id="cancel_button"
        class="btn btn-outline-primary btn-sm">Cancel</button>

    </form>

      {% if error_message %}
      <div class="alert alert-danger" role="alert">
      {{error_message}}  
      </div>
      {% endif %}
</td>
</tr>
