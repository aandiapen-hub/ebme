<script id="set-select-script">
    const brandSelect = document.getElementById('id_brandid');
    if (brandSelect) {
        var option = new Option('{{ data.brand.brandname }}', '{{ data.brand.brandid }}', true, true);
        $('#id_brandid').append(option).trigger('change');
        htmx.trigger('#mainform', 'change');
    }

    if (typeof modal === 'undefined') {
        let modal = bootstrap.Modal.getInstance(document.getElementById('modals-here'));
        if (modal) modal.hide();
}
</script>

    value="{{data.brand.brandid}}"

                $('#id_brandid').append(option).trigger('change');"
