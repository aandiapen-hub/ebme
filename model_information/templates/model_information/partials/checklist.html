
{% load render_table from django_tables2 %}

{% block content %}
<div class='container'>
    <h5>Checklist for {{model}}</h5>
    <!-- Button to create a new brand -->
    {% if perms.assets.add_tblcheckslists %}
        <button
        hx-get="{% url 'model_information:create_check'%}?modelid={{model.modelid}}"
        hx-target="#modals-here"
        hx-trigger="click"
        data-bs-toggle="modal"
        data-bs-target="#modals-here"
        class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-plus-lg"></i>
        </button>   
    {% endif %}
    <!-- Render the table -->
    <div id='table-container' class="table-container">
        {% render_table table %}
    </div>
</div>

<!-- Render the table -->
{% include "modal_div_base.html" %}

{% endblock %}
