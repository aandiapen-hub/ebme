services:
  web:
    build:
      context: .
      dockerfile: docker/prod/Dockerfile
    ports:
      - "10000:10000"
    volumes:
      - ./media:/app/media
    env_file:
      - .env.production
      - static/company_info/.env
    extra_hosts:
      -  "host.docker.internal:host-gateway"
    tty: "true"
      
  redis:
    image: redis:latest
    ports:
      - "6379:6379"
